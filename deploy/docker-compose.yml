version: "3.9"

# RAG Knowledge Base - Production Docker Compose
# Usage: docker compose -f deploy/docker-compose.yml up -d

services:
  # PostgreSQL - Metadata and job storage
  postgres:
    image: postgres:16-alpine
    container_name: ragkb-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-ragkb}
      # Performance tuning for production
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-ragkb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Qdrant - Vector and sparse vector database
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: ragkb-qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"  # REST API
      - "127.0.0.1:6334:6334"  # gRPC (optional)
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant_config.yaml:/qdrant/config/production.yaml:ro
    environment:
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Server - FastAPI HTTP interface
  api:
    build:
      context: ../app/backend
      dockerfile: ../../deploy/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: ragkb-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Database
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-ragkb}
      # Vector DB
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      # Models
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      HF_TOKEN: ${HF_TOKEN:-}
      # LLM for answers
      ANSWER_LLM_BASE_URL: ${ANSWER_LLM_BASE_URL:?ANSWER_LLM_BASE_URL must be set}
      ANSWER_LLM_MODEL: ${ANSWER_LLM_MODEL:?ANSWER_LLM_MODEL must be set}
      ANSWER_LLM_API_KEY: ${ANSWER_LLM_API_KEY:-}
      # Storage
      STORAGE_PATH: /data/storage
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
      # API settings
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2}
      # Chunking
      CHUNK_MAX_TOKENS: ${CHUNK_MAX_TOKENS:-500}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-150}
      # Retrieval
      ABSTENTION_SCORE_THRESHOLD: ${ABSTENTION_SCORE_THRESHOLD:-0.3}
      OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD:-0.5}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Safety
      CREATE_ALL_FALLBACK: "false"
    volumes:
      - storage_data:/data/storage
      - model_cache:/root/.cache/huggingface  # Persist downloaded models
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Worker - Background job processor
  worker:
    build:
      context: ../app/backend
      dockerfile: ../../deploy/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: ragkb-worker
    restart: always
    command: ["python", "-m", "app.backend.workers.ingestion_worker"]
    environment:
      # Database
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-ragkb}
      # Vector DB
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      # Models
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      HF_TOKEN: ${HF_TOKEN:-}
      # Storage
      STORAGE_PATH: /data/storage
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2}
      # Chunking
      CHUNK_MAX_TOKENS: ${CHUNK_MAX_TOKENS:-500}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-150}
      # Retrieval
      ABSTENTION_SCORE_THRESHOLD: ${ABSTENTION_SCORE_THRESHOLD:-0.3}
      OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD:-0.5}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - storage_data:/data/storage
      - model_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G  # Higher for embedding model
        reservations:
          memory: 1G

volumes:
  pgdata:
    driver: local
  qdrant_data:
    driver: local
  storage_data:
    driver: local
  model_cache:
    driver: local

